<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
      name="description"
      content="Edu-Stream, a learning management system that guides beginners in tech areas such as Web Development, UI/UX Design, Cybersecurity and Artificial Intelligence."
    />
  <link rel="icon" href="image/edu-stream-logo.png">
  <link rel="stylesheet" href="style/Edu-Stream.css">
  <link rel="stylesheet" href="style/login.css">
  <title>Login | Edu-Stream</title>
</head>
<body>

  <div class="loginMessage">Success!</div>
  
  <div class="loginWrapper">
    <div class="login-page-title loginLogo">
      <div class="website-name">
        <img
          class="header-icon"
          src="image/edu-stream-logo.png"
          alt="website-logo"
        />
        <p>Edu-Stream</p>
      </div>
    </div>

      <form class="login-form-js">
        <div class="loginInputs">
          <h2 class="form-title-js">Login</h2>

          <div class="input1">
            <label class="Ilabel" for="name">Username:</label>
            <input class="input inputName-js" type="text" placeholder="Enter username" name="name" required>
          </div>

          <div class="input2">
            <label class="Ilabel" for="password">Password:</label>
            <input class="input inputPassword-js" type="password" placeholder="*********" name="password" required>
          </div>

          <div class="signin">
            <button type="submit" class="submit-btn-js">Log In</button>
          </div>
          
          <div class="form-footer">
            <div class="forgot">Forgot password? <span class="clickHere clickHere-js">Click here</span></div>
            
            <div class="signup-toggle">
              <span class="toggle-text-js">Don't have an account?</span> 
              <span class="toggle-link-js toggle-link">Sign Up</span>
            </div>
          </div>

          <div class="alert"></div>

        </div>
      </form>
  </div>

  <script src="script/login.js"></script>
</body>
</html>
