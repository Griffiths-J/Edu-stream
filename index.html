<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="image/edu-stream-logo.png">
  <link rel="stylesheet" href="style/Edu-Stream.css">
  <link rel="stylesheet" href="style/login.css">
  <title>Login | Edu-Stream</title>
</head>
<body>

  <div class="loginMessage">Enter new username and password</div>
  
  <div class="loginWrapper">
    <div class="login-page-title"><div class="website-name">
        <img
          class="header-icon"
          src="image/edu-stream-logo.png"
          alt="website-logo"
        />
        <p>Edu-Stream</p>
      </div></div>

      <form class="login">
        <div class="logintitle">Login/Sign up</div>
        <div class="loginInputs">

          <div class="input1">
            <label class="Ilabel" for="name">Username:</label>
            <input class="input inputName-js" type="text" placeholder="Enter username" name="name" required>
          </div>

          <div class="input2">
            <label class="Ilabel" for="password">Password:</label>
            <input class="input inputPassword-js" type="password" placeholder="enter password" name="password" required>
          </div>

          <div class="techArea">
            <label for="course">Areas of Interest:</label>
            <p><input type="checkbox" value="Webdev" name="course">Web Development</p>
            <p><input type="checkbox" value="Cybersecurity" name="course">Cybersecurity</p>
            <p><input type="checkbox" value="ui_ux" name="course">Ui/Ux</p>
            <p><input type="checkbox" value="ai" name="course">Artificial Intelligence</p>
          </div> 

          <div class="signin signin-js"><a href=""><button>Sign in</button></a></div>
          
          <div class="forgot">forgot password? <span class="clickHere clickHere-js">click here</span></div>

          <div class="alert"></div>

        </div>
      </form>
  </div>
  <script src="script/login.js"></script>
</body>
</html>
