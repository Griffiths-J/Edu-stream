<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  <script src="data/videojs-youtube.js"></script>
  <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-youtube/3.0.1/videojs-youtube.min.js"></script> -->
  <title>Edu-Stream</title>

  <style>
   
.vjs-matrix.video-js .vjs-big-play-button {
  background-color: #8e44ad; 
  border-radius: 50%;       
  border: none;
}

/* 1. Make the player have rounded corners to match modern UI */
.video-js {
  border-radius: 12px;
  overflow: hidden; /* Ensures the video doesn't bleed past rounded corners */
  font-family: 'Your-Website-Font', sans-serif;
}

/* 2. Style the Big Play Button (The one in the center) */
.video-js .vjs-big-play-button {
  width: 80px;
  height: 80px;
  line-height: 80px;
  border-radius: 50%; /* Makes it a circle */
  background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black */
  border: 2px solid #ffffff; 
  transition: all 0.3s ease;
}

/* Hover effect for the play button */
.video-js:hover .vjs-big-play-button {
  background-color: #ff0000; /* Swap this for your Brand Color */
  transform: scale(1.1);
}

/* 3. Style the Control Bar (The strip at the bottom) */
.video-js .vjs-control-bar {
  background-color: rgba(20, 20, 20, 0.9); /* Dark background to match your site */
  height: 50px;
}

/* 4. Style the Progress Bar (The loading/seek bar) */
.video-js .vjs-play-progress, 
.video-js .vjs-volume-level {
  background-color: #ff0000; /* Swap this for your Brand Color */
}

/* Remove the default focus outline for a cleaner look */
.video-js:focus {
  outline: none;
}

/* Make the icons slightly larger and cleaner */
.video-js .vjs-button > .vjs-icon-placeholder:before {
  font-size: 1.8em;
  line-height: 1.6;
}
  </style>
</head>
<body>
    <div id="video-grid" class="video"></div>


    <script>

      async function rend(){

        try{
          
        
         const responds = await fetch("./data/data.json");

        const data = await responds.json();
console.log(data)
      
      // 1. Your existing array (shorthand version for example)
const myVideos =data;


  const container = document.getElementById('video-grid');
  
  // Clear the container first
  container.innerHTML = '';

  myVideos.map(video => {
    // Create the card HTML string
    let cardHTML = `
      <div class="video-card">
        <div class="video-wrapper">
          <video
            id="${video.id}"
            class="video-js vjs-default-skin vjs-big-play-centered"
            controls
            preload="none" 
            poster="${video.thumbnail}"
            width="640"
            data-setup='{ 
              "techOrder": ["youtube"], 
              "sources": [{ "type": "video/youtube", "src": "${video.youtubeId}" }],
              "youtube": { "iv_load_policy": 3, "modestbranding": 1, "rel": 0 }
            }'>
          </video>
        </div>
        <div class="video-info">
          <h3>${video.title}</h3>
        </div>
      </div>
    `;
    
    // Inject into the container
    container.innerHTML += cardHTML;
  });

  // 3. IMPORTANT: Tell Video.js to look for these new tags
  // We do this AFTER the loop finishes so it doesn't slow down the page
  myVideos.forEach(video => {
    videojs(video.id); 
  });

    }catch(error){
console.error("Error loading videos:",error)

    }

      }

     rend();
    </script>
</body>
</html>
